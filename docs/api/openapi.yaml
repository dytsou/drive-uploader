components:
  schemas:
    AccessRequestCreateRequest:
      type: object
      required:
        - folderId
        - folderName
      properties:
        folderId:
          type: string
        folderName:
          type: string
    ActivityLog:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        timestamp:
          type: integer
          format: int64
        severity:
          $ref: '#/components/schemas/ActivitySeverity'
        userEmail:
          type: string
        itemName:
          type: string
        status:
          type: string
        ipAddress:
          type: string
    ActivitySeverity:
      type: string
      enum:
        - info
        - warning
        - error
        - critical
    AdminLatencySummary:
      type: object
      properties:
        totalCheckMs:
          type: integer
          format: int32
        averageDependencyMs:
          type: integer
          format: int32
        fastestDependency:
          $ref: '#/components/schemas/DependencyLatency'
        slowestDependency:
          $ref: '#/components/schemas/DependencyLatency'
        dependencies:
          $ref: '#/components/schemas/DependencyLatencies'
    AdminSystemHealthResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        timestamp:
          type: string
          format: date-time
        services:
          $ref: '#/components/schemas/HealthServices'
        errorRate:
          $ref: '#/components/schemas/ErrorRateSummary'
        latency:
          $ref: '#/components/schemas/AdminLatencySummary'
    AppConfig:
      type: object
      properties:
        hideAuthor:
          type: boolean
        appName:
          type: string
        logoUrl:
          type: string
        faviconUrl:
          type: string
        primaryColor:
          type: string
    AuthenticateFolderRequest:
      type: object
      required:
        - folderId
        - password
      properties:
        folderId:
          type: string
        id:
          type: string
        password:
          type: string
    AuthenticateFolderResponse:
      type: object
      properties:
        token:
          type: string
    CacheBackend:
      type: string
      enum:
        - redis
        - memory
    CacheHealth:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ServiceStatus'
        latency:
          type: integer
          format: int32
        checkedAt:
          type: string
          format: date-time
        error:
          type: string
        backend:
          $ref: '#/components/schemas/CacheBackend'
    CreateShareLinkRequest:
      type: object
      required:
        - itemName
        - type
        - expiresIn
      properties:
        path:
          type: string
        itemName:
          type: string
        type:
          $ref: '#/components/schemas/ShareType'
        expiresIn:
          type: string
        loginRequired:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/DriveFile'
        maxUses:
          type: integer
          format: int32
          nullable: true
        preventDownload:
          type: boolean
        hasWatermark:
          type: boolean
        watermarkText:
          type: string
          nullable: true
    CreateShareLinkResponse:
      type: object
      properties:
        shareableUrl:
          type: string
        token:
          type: string
        jti:
          type: string
        newShareLink:
          $ref: '#/components/schemas/ShareLink'
    DeleteFileRequest:
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
    DependencyLatencies:
      type: object
      properties:
        database:
          type: integer
          format: int32
        cache:
          type: integer
          format: int32
        google_drive:
          type: integer
          format: int32
    DependencyLatency:
      type: object
      properties:
        name:
          type: string
        latency:
          type: integer
          format: int32
    DriveFile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mimeType:
          type: string
        size:
          type: string
        modifiedTime:
          type: string
          format: date-time
        createdTime:
          type: string
          format: date-time
        isFolder:
          type: boolean
        hasThumbnail:
          type: boolean
        thumbnailLink:
          type: string
        webViewLink:
          type: string
        parents:
          type: array
          items:
            type: string
        trashed:
          type: boolean
    EmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          anyOf:
            - type: string
            - type: array
              items: {}
      description: Mirrors the legacy OpenAPI error shape used across the app.
    ErrorRateSummary:
      type: object
      properties:
        last24h:
          type: integer
          format: int32
        previous24h:
          type: integer
          format: int32
        trendPercentage:
          type: number
          format: double
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    ErrorWithDetails:
      type: object
      required:
        - error
        - details
      properties:
        error:
          type: string
        details:
          type: array
          items: {}
    FileListResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/DriveFile'
        nextPageToken:
          type: string
    FileRequestCreateRequest:
      type: object
      required:
        - folderId
        - folderName
        - title
        - expiresIn
      properties:
        folderId:
          type: string
        folderName:
          type: string
        title:
          type: string
        expiresIn:
          type: integer
